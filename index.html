<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Calendar Generator</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background:#eef;
    margin: 0;
}

header {
    width: 100%;
    margin: 0;
    padding: 25px 15px;
    box-sizing: border-box;
    background: linear-gradient(135deg, #0a0f1c, #111827);
    color: #00ffcc;
    text-align: center;
    border-bottom: 2px solid #00ffcc;
}

canvas {
    border:1px solid #333;
    margin-top:20px;
    max-width:100%;
}

input, button, select {
    padding:8px;
    margin:5px;
}

/* MOBILE */
@media (max-width: 768px) {
    input, button, select {
        width: 90%;
    }
}
</style>
</head>

<body>

<header>
    <h1>ISO YAWI</h1>
    <h3>Building Cool Products</h3>
    <div style="font-size:13px;">📧 Email | 📱 Phone | PNG University of Technology</div>
</header>

<h2>📅 Custom Photo Calendar</h2>

<input type="file" id="upload"><br>

<input type="number" id="year" value="2026"><br>

<input type="text" id="name" placeholder="Enter Name"><br>

<input type="text" id="quote" placeholder="Enter Quote / Scripture"><br>

<label>Date Color:</label>
<input type="color" id="dateColor" value="#000000"><br>

<label>Date Font:</label>
<select id="dateFont">
    <option value="Arial">Arial</option>
    <option value="Verdana">Verdana</option>
    <option value="Georgia">Georgia</option>
    <option value="Courier New">Courier New</option>
    <option value="Tahoma">Tahoma</option>
</select><br>

<label>Background:</label>
<input type="color" id="bgcolor" value="#ffffff"><br>

<label>Layout:</label>
<select id="layout">
    <option value="overlay">Overlay on Image</option>
    <option value="top">Calendar Below Image</option>
</select><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<br>

<canvas id="canvas" width="1000" height="1400"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();

document.getElementById("upload").onchange = function(e){
    const file = e.target.files[0];
    img.src = URL.createObjectURL(file);
};

function generate(){

    const year = parseInt(document.getElementById("year").value);
    const name = document.getElementById("name").value;
    const quote = document.getElementById("quote").value;
    const bgColor = document.getElementById("bgcolor").value;
    const layout = document.getElementById("layout").value;

    const dateColor = document.getElementById("dateColor").value;
    const dateFont = document.getElementById("dateFont").value;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // BACKGROUND
    ctx.fillStyle = bgColor;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let startY = 0;

    // IMAGE LOGIC (IMPORTANT FIX)
    if(img.src){

        if(layout === "overlay"){
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            startY = 200; // overlay starts lower on image
        } else {
            ctx.drawImage(img, 0, 0, canvas.width, 500);
            startY = 750;
        }
    } else {
        startY = 750;
    }

    // TEXT STYLE (GLOBAL)
    ctx.fillStyle = dateColor;

    ctx.font = "bold 40px " + dateFont;
    ctx.fillText(name || "My Calendar", 300, 80);

    ctx.font = "24px " + dateFont;
    ctx.fillText("Year " + year, 400, 120);

    ctx.font = "16px " + dateFont;
    wrapText(quote, 200, 160, 600, 20);

    const months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    months.forEach((month, index)=>{

        let col = index % 3;
        let row = Math.floor(index / 3);

        let x = 50 + col * 300;
        let y = startY + row * 170;

        drawMonth(month, year, x, y, dateColor, dateFont);
    });

    drawWatermark();
}

// MONTH DRAWING
function drawMonth(month, year, x, y, color, font){

    let monthIndex = new Date(Date.parse(month + " 1, " + year)).getMonth();
    let firstDay = new Date(year, monthIndex, 1).getDay();
    let days = new Date(year, monthIndex + 1, 0).getDate();

    ctx.fillStyle = color;
    ctx.font = "bold 14px " + font;
    ctx.fillText(month, x, y);

    const weekDays = ["S","M","T","W","T","F","S"];
    ctx.font = "12px " + font;

    weekDays.forEach((d,i)=>{
        ctx.fillText(d, x + i*30, y + 20);
    });

    let day = 1;

    for(let i=0;i<6;i++){
        for(let j=0;j<7;j++){

            if(i===0 && j<firstDay) continue;
            if(day>days) return;

            ctx.fillText(day, x + j*30, y + 40 + i*18);
            day++;
        }
    }
}

// TEXT WRAP
function wrapText(text, x, y, maxWidth, lineHeight) {

    if(!text) return;

    let words = text.split(' ');
    let line = '';

    for(let n=0;n<words.length;n++){

        let testLine = line + words[n] + ' ';
        let width = ctx.measureText(testLine).width;

        if(width > maxWidth && n > 0){
            ctx.fillText(line, x, y);
            line = words[n] + ' ';
            y += lineHeight;
        } else {
            line = testLine;
        }
    }

    ctx.fillText(line, x, y);
}

// WATERMARK
function drawWatermark(){

    ctx.save();
    ctx.font = "14px Arial";
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.textAlign = "center";

    ctx.fillText(
        "ISO YAWI • Product Creator • PNG",
        canvas.width/2,
        canvas.height - 20
    );

    ctx.restore();
}

// DOWNLOAD
function download(){
    const link = document.createElement("a");
    link.download = "calendar.png";
    link.href = canvas.toDataURL();
    link.click();
}

</script>
<footer style="margin-top:20px; padding:15px; background:#0a0f1c; color:#00ffcc; text-align:center;">
    ISO YAWI ⚡ School of Electrical Engineering ⚡ PNG University of Technology<br>
    <em style="color:#aaa;">Building cool projects for students</em>
</footer>
</body>
</html>
