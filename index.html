<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Calendar Generator</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background:#eef;
}

canvas {
    border:1px solid #333;
    margin-top:20px;
    max-width:100%;
}

input, button, select {
    padding:8px;
    margin:5px;
}

/* MOBILE */
@media (max-width: 768px) {
    input, button, select {
        width: 90%;
    }
}
</style>
</head>

<body>

<h2>📅 Custom Photo Calendar</h2>

<input type="file" id="upload"><br>

<input type="number" id="year" value="2026"><br>

<input type="text" id="name" placeholder="Enter Name"><br>

<input type="text" id="quote" placeholder="Enter Quote / Scripture"><br>

<label>Calendar Font Color:</label>
<input type="color" id="dateColor" value="#000000"><br>
<label>Calendar Font Style:</label>
<select id="dateFont">
    <option value="Arial">Arial</option>
    <option value="Verdana">Verdana</option>
    <option value="Georgia">Georgia</option>
    <option value="Courier New">Courier New</option>
    <option value="Tahoma">Tahoma</option>
</select><br>

<label>Background Color:</label>
<input type="color" id="bgcolor" value="#ffffff"><br>

<label>Layout:</label>
<select id="layout">
    <option value="overlay">Overlay on Image</option>
    <option value="top">Calendar Below Image</option>
</select><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<br>
<canvas id="canvas" width="1000" height="1400"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();

document.getElementById("upload").onchange = function(e){
    const file = e.target.files[0];
    img.src = URL.createObjectURL(file);
};

function generate(){

    const year = parseInt(document.getElementById("year").value);
    const name = document.getElementById("name").value;
    const quote = document.getElementById("quote").value;
    const bgColor = document.getElementById("bgcolor").value;
    const layout = document.getElementById("layout").value;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const dateColor = document.getElementById("dateColor").value;
    const dateFont = document.getElementById("dateFont").value;

    drawWatermark();

    // === BACKGROUND ===
    ctx.fillStyle = bgColor;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // === IMAGE FULL CANVAS ===
    if(img.src){
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    // === TEXT STYLE ===
    ctx.fillStyle = "black";

    // TITLE
    ctx.font = "bold 40px Arial";
    ctx.fillText(name || "My Calendar", 320, 60);

    // YEAR
    ctx.font = "24px Arial";
    ctx.fillText("Year " + year, 420, 100);

    // QUOTE
    ctx.font = "16px Arial";
    wrapText(quote, 200, 130, 600, 20);

    // === MONTHS POSITION ===
    let startY = (layout === "overlay") ? 200 : 500;

    const months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    months.forEach((month, index)=>{

        let col = index % 3;
        let row = Math.floor(index / 3);

        let x = 50 + col * 300;
        let y = startY + row * 170;

        ctx.fillStyle = dateColor;
        ctx.font = "12px " + dateFont;

        ctx.fillText(day, x + j*30, y + 35 + i*18);

        ctx.font = "bold 14px " + dateFont;
ctx.fillStyle = dateColor;
ctx.fillText(month, x, y);
    });
}

// DRAW MONTH
function drawMonth(month, year, x, y){

    const monthIndex = new Date(Date.parse(month +" 1, "+year)).getMonth();
    const firstDay = new Date(year, monthIndex, 1).getDay();
    const days = new Date(year, monthIndex+1, 0).getDate();

    ctx.fillStyle = "black";

    ctx.font = "bold 14px Arial";
    ctx.fillText(month, x, y);

    const weekDays = ["S","M","T","W","T","F","S"];
    ctx.font = "12px Arial";

    weekDays.forEach((d,i)=>{
        ctx.fillText(d, x + i*30, y + 15);
    });

    let day = 1;

    for(let i=0;i<6;i++){
        for(let j=0;j<7;j++){

            if(i===0 && j<firstDay) continue;
            if(day>days) return;

            ctx.fillText(day, x + j*30, y + 35 + i*18);
            day++;
        }
    }
}

// WRAP TEXT
function wrapText(text, x, y, maxWidth, lineHeight) {

    if(!text) return;

    let words = text.split(' ');
    let line = '';

    for(let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = ctx.measureText(testLine);

        if (metrics.width > maxWidth && n > 0) {
            ctx.fillText(line, x, y);
            line = words[n] + ' ';
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    ctx.fillText(line, x, y);
}

//Watermark

function drawWatermark() {

    ctx.save();

    // Style watermark
    ctx.font = "16px Arial";
    ctx.fillStyle = "rgba(0,0,0,0.35)"; // transparent black
    ctx.textAlign = "center";

    // Bottom center position
   ctx.font = "bold 14px Arial";
ctx.fillStyle = "rgba(0,0,0,0.25)";
ctx.fillText("ISO YAWI • Product Creator • PNG", canvas.width/2, canvas.height-25);

    ctx.restore();
}

// DOWNLOAD
function download(){
    const link = document.createElement("a");
    link.download = "calendar.png";
    link.href = canvas.toDataURL();
    link.click();
}

</script>

<footer style="margin-top:20px; padding:15px; background:#111; color:#00ffcc; text-align:center;">
    <strong>ISO YAWI</strong> | School of Electrical Engineering | PNG University of Technology<br>
    <span style="color:#ccc;">Building cool projects for students</span>
</footer>

</body>
</html>
