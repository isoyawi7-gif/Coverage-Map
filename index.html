<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Universal Document Viewer</title>

<!-- FIXED: correct loading -->
<script src="https://unpkg.com/docx-preview@0.2.0/dist/docx-preview.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #eef2f7;
    color: #111;
}

header {
    background: white;
    padding: 15px;
    text-align: center;
    border-bottom: 2px solid #00ffcc;
}

.container {
    width: 85%;
    margin: auto;
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    padding: 10px;
    margin: 10px;
}

button {
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

#preview {
    margin-top: 20px;
    padding: 15px;
    border: 1px solid #ddd;
    min-height: 300px;
    background: white;
    overflow: auto;
}

img {
    max-width: 100%;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
}

footer {
    text-align: center;
    padding: 15px;
    margin-top: 20px;
    background: white;
    border-top: 2px solid #00ffcc;
}

</style>
</head>

<body>

<header>
    <h2>📄 Universal Document Viewer</h2>
    <p>Reliable Preview System</p>
</header>

<div class="container">

    <input type="file" id="fileInput">
    <button onclick="previewFile()">Preview</button>
    <button onclick="exportPDF()">Export Visible View</button>

    <div id="preview">Upload a file</div>

</div>

<footer>
    © 2026 Iso Yawi | Electrical Engineering Project
</footer>

<script>

let currentFile = null;

/* ================= PREVIEW ================= */
async function previewFile() {

    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");

    if (!fileInput.files.length) {
        preview.innerHTML = "⚠️ Please select a file first";
        return;
    }

    const file = fileInput.files[0];
    currentFile = file;

    const ext = file.name.split('.').pop().toLowerCase();

    preview.innerHTML = "Loading...";

    try {

        // TEXT
        if (ext === "txt") {
            preview.innerHTML = `<pre>${await file.text()}</pre>`;
        }

        // IMAGE
        else if (["png","jpg","jpeg","gif"].includes(ext)) {
            preview.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
        }

        // PDF
        else if (ext === "pdf") {
            preview.innerHTML = `<iframe src="${URL.createObjectURL(file)}"></iframe>`;
        }

        // DOCX (FIXED)
        else if (ext === "docx") {

            const buffer = await file.arrayBuffer();

            preview.innerHTML = ""; // clear first

            await window.docx.renderAsync(buffer, preview);

        }

        else {
            preview.innerHTML = "⚠️ File type not supported";
        }

    } catch (err) {
        console.error(err);
        preview.innerHTML = "⚠️ Error loading file";
    }
}

/* ================= EXPORT ================= */
async function exportPDF() {

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    const preview = document.getElementById("preview");

    if (!preview.innerHTML.trim()) {
        alert("Nothing to export");
        return;
    }

    await pdf.html(preview, {
        x: 10,
        y: 10,
        width: 180,
        windowWidth: preview.scrollWidth,
        callback: function(doc) {

            doc.setFontSize(14);
            doc.text("Generated Preview", 20, 10);

            doc.save("output.pdf");
        }
    });
}

</script>

</body>
</html>
