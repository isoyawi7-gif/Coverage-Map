<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Document Scanner System</title>

<!-- DOCX RENDERER (images + formatting preserved) -->
<script src="https://unpkg.com/docx-preview@0.2.0/dist/docx-preview.js"></script>

<!-- PDF GENERATOR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

/* ================= HEADER ================= */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(90deg, #0f172a, #111827);
    padding: 15px 25px;
    border-bottom: 2px solid #00ffcc;
}

header img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #00ffcc;
    object-fit: cover;
}

header h1 {
    font-size: 20px;
    margin: 0;
    color: #00ffcc;
}

header p {
    margin: 0;
    font-size: 12px;
    color: #9ca3af;
}

/* ================= MAIN CONTAINER ================= */
.container {
    width: 85%;
    margin: auto;
    background: #111827;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
}

/* ================= BUTTONS ================= */
input, button {
    padding: 10px;
    margin: 10px;
}

button {
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* ================= PREVIEW ================= */
#viewer {
    background: white;
    color: black;
    padding: 20px;
    margin-top: 15px;
    min-height: 400px;
    overflow-x: auto;
    border-radius: 8px;
}

/* ================= FOOTER ================= */
footer {
    margin-top: 30px;
    padding: 15px;
    text-align: center;
    background: #0f172a;
    border-top: 2px solid #00ffcc;
    color: #9ca3af;
    font-size: 13px;
}
</style>
</head>

<body>

<!-- ================= HEADER WITH PHOTO ================= -->
<header>
    <div>
        <h1>📄 Pro Document Scanner System</h1>
        <p>Engineering Grade DOCX → PDF Converter</p>
    </div>

    <!-- 🔥 YOUR PHOTO HERE -->
    <img src="your-photo.jpg" alt="Iso Yawi">
</header>

<!-- ================= MAIN UI ================= -->
<div class="container">

    <h3>Upload Document (.docx)</h3>

    <input type="file" id="fileInput" accept=".docx">

    <br>

    <button onclick="loadDocx()">Preview Document</button>
    <button onclick="exportPDF()">Download PDF</button>

    <div id="viewer">Document preview will appear here...</div>

</div>

<!-- ================= FOOTER ================= -->
<footer>
    <p>© 2026 Iso Yawi | Papua New Guinea University of Technology</p>
    <p>Electrical Engineering • Pro Document Scanner System</p>
</footer>

<script>

let viewer = document.getElementById("viewer");

/* ================= LOAD DOCX ================= */
async function loadDocx() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please upload a DOCX file");
        return;
    }

    const buffer = await file.arrayBuffer();

    viewer.innerHTML = "";

    await docx.renderAsync(buffer, viewer, null, {
        inWrapper: true,
        ignoreWidth: false,
        ignoreHeight: false
    });
}

/* ================= EXPORT PDF WITH WATERMARK ================= */
async function exportPDF() {

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    if (!viewer.innerHTML) {
        alert("No document loaded");
        return;
    }

    await pdf.html(viewer, {
        callback: function (doc) {

            // 🔥 WATERMARK
            doc.setTextColor(200);
            doc.setFontSize(28);
            doc.text(
                "Iso Yawi PDF Converter",
                20,
                150,
                { angle: 45 }
            );

            doc.save("Pro_Scanned_Document.pdf");
        },
        x: 10,
        y: 10,
        width: 180
    });
}

</script>

</body>
</html>
