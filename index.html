<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Document Converter System</title>

<!-- DOCX RENDER ENGINE -->
<script src="https://unpkg.com/docx-preview@0.2.0/dist/docx-preview.js"></script>

<!-- PDF ENGINE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fa;
    color: #111827;
}

/* ================= HEADER ================= */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: white;
    border-bottom: 2px solid #00ffcc;
}

header h1 {
    margin: 0;
    font-size: 18px;
}

header p {
    margin: 0;
    font-size: 12px;
    color: #6b7280;
}

header img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid #00ffcc;
}

/* ================= CONTAINER ================= */
.container {
    width: 90%;
    margin: auto;
    margin-top: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

/* ================= INPUT & BUTTON ================= */
input {
    padding: 10px;
    margin: 10px;
}

button {
    padding: 10px;
    margin: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
}

/* ================= STATUS ================= */
#fileStatus {
    color: green;
    font-size: 14px;
}

/* ================= PAGE ================= */
.page {
    width: 95%;
    background: white;
    color: black;
    margin: 15px auto;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
}

/* ================= FOOTER ================= */
footer {
    text-align: center;
    padding: 15px;
    margin-top: 20px;
    background: white;
    border-top: 2px solid #00ffcc;
    color: #6b7280;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

    header {
        flex-direction: column;
        text-align: center;
    }

    header img {
        margin-top: 10px;
    }

    .container {
        width: 95%;
    }

    input, button {
        width: 95%;
        display: block;
        margin: 10px auto;
    }

    .page {
        width: 100%;
        padding: 10px;
    }
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header>
    <div>
        <h1>📄 Iso Yawi Document Converter</h1>
        <p>DOCX → PDF • Clean Web Converter</p>
    </div>

    <img src="images.jfif" alt="Profile">
</header>

<!-- ================= MAIN ================= -->
<div class="container">

    <h3>Upload Document (.docx)</h3>

    <input type="file" id="fileInput" accept=".docx" onchange="handleUpload()">

    <p id="fileStatus"></p>

    <button id="previewBtn" onclick="loadDoc()" disabled>Preview Document</button>
    <button onclick="exportPDF()">Export PDF</button>

    <div id="pages"></div>

</div>

<!-- ================= FOOTER ================= -->
<footer>
    © 2026 Iso Yawi | Papua New Guinea University of Technology  
    <br>
    Electrical Engineering • Document Converter System  
    <br>
    Building Cool Projects for Students
</footer>

<script>

let pagesContainer = document.getElementById("pages");
let selectedFile = null;

/* ================= HANDLE UPLOAD ================= */
function handleUpload() {

    const file = document.getElementById("fileInput").files[0];
    const status = document.getElementById("fileStatus");
    const previewBtn = document.getElementById("previewBtn");

    if (!file) return;

    selectedFile = file;

    status.innerHTML = "✅ Uploaded: " + file.name;
    previewBtn.disabled = false;
}

/* ================= LOAD DOCX ================= */
async function loadDoc() {

    if (!selectedFile) {
        alert("Upload a DOCX file first");
        return;
    }

    const buffer = await selectedFile.arrayBuffer();

    pagesContainer.innerHTML = "";

    const temp = document.createElement("div");

    await docx.renderAsync(buffer, temp, null, {
        inWrapper: true
    });

    let page = document.createElement("div");
    page.className = "page";
    page.innerHTML = temp.innerHTML;

    pagesContainer.appendChild(page);
}

/* ================= EXPORT PDF ================= */
async function exportPDF() {

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");

    let page = document.querySelector(".page");

    if (!page) {
        alert("No document loaded");
        return;
    }

    await pdf.html(page, {
        x: 10,
        y: 10,
        width: 180,
        html2canvas: { scale: 0.8 },
        callback: function (doc) {

            doc.setTextColor(180);
            doc.setFontSize(28);
            doc.text("Iso Yawi PDF Converter", 30, 150, { angle: 45 });

            doc.save("Converted_Document.pdf");
        }
    });
}

</script>

</body>
</html>
