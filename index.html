<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Calendar Generator</title>

<style>
body { font-family: Arial; text-align: center; background:#eef; }
canvas { border:1px solid #333; margin-top:20px; max-width:100%; }

/* MOBILE */
@media (max-width: 768px) {
    input, button {
        width: 90%;
        margin: 5px 0;
    }
}
</style>
</head>

<body>

<h2>📅 Custom Photo Calendar</h2>

<input type="file" id="upload"><br><br>
<input type="number" id="year" value="2026"><br><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<br>
<canvas id="canvas" width="1000" height="1400"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();

document.getElementById("upload").onchange = function(e){
    const file = e.target.files[0];
    img.src = URL.createObjectURL(file);
};

function generate(){

    const year = parseInt(document.getElementById("year").value);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // === DRAW IMAGE ===
    if(img.src){
        ctx.drawImage(img, 0, 0, canvas.width, 500);
    }

    // === TITLE ===
    ctx.fillStyle = "black";
    ctx.font = "40px Arial";
    ctx.fillText("Calendar " + year, 350, 550);

    // === MONTHS ===
    const months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    let startY = 600;

    months.forEach((month, index)=>{

        let col = index % 3;
        let row = Math.floor(index / 3);

        let x = 50 + col * 300;
        let y = startY + row * 180;

        drawMonth(month, year, x, y);
    });
}

function drawMonth(month, year, x, y){

    const monthIndex = new Date(Date.parse(month +" 1, "+year)).getMonth();
    const firstDay = new Date(year, monthIndex, 1).getDay();
    const days = new Date(year, monthIndex+1, 0).getDate();

    // Month title
    ctx.fillStyle = "black";
    ctx.font = "16px Arial";
    ctx.fillText(month, x, y);

    // Week headers
    const weekDays = ["S","M","T","W","T","F","S"];
    ctx.font = "12px Arial";

    weekDays.forEach((d,i)=>{
        ctx.fillText(d, x + i*30, y + 15);
    });

    let day = 1;

    for(let i=0;i<6;i++){
        for(let j=0;j<7;j++){

            if(i===0 && j<firstDay) continue;
            if(day>days) return;

            ctx.fillText(day, x + j*30, y + 35 + i*18);
            day++;
        }
    }
}

function download(){
    const link = document.createElement("a");
    link.download = "calendar.png";
    link.href = canvas.toDataURL();
    link.click();
}

</script>

<footer style="margin-top:20px; padding:15px; background:#111; color:#00ffcc; text-align:center;">
    <strong>ISO YAWI</strong> | School of Electrical Engineering | PNG University of Technology<br>
    <span style="color:#ccc;">Building cool projects for students</span>
</footer>

</body>
</html>
