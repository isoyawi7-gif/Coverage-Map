<!DOCTYPE html>
<html>
<head>
<title>Custom Calendar Generator</title>
<style>
body { font-family: Arial; text-align: center; background:#eef; }
canvas { border:1px solid #333; margin-top:20px; }

/* ================= MOBILE RESPONSIVE ================= */
@media (max-width: 768px) {

    body {
        font-size: 14px;
    }

    h2 {
        font-size: 18px;
    }

    .controls {
        width: 95%;
        padding: 10px;
    }

    input, button {
        width: 90%;
        margin: 5px 0;
        font-size: 14px;
    }

    canvas {
        width: 100% !important;
        height: auto !important;
    }

    footer {
        font-size: 12px;
        padding: 10px;
    }
}
</style>
</head>

<body>

<h2> Custom Photo Calendar</h2>

<input type="file" id="upload"><br><br>
<input type="number" id="year" value="2026"><br><br>

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<br>
<canvas id="canvas" width="800" height="600"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = null;

document.getElementById("upload").onchange = function(e){
    const file = e.target.files[0];
    img = new Image();
    img.src = URL.createObjectURL(file);
};

function generate(){

    const year = document.getElementById("year").value;

    // Clear
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Draw image
    if(img){
        ctx.drawImage(img,0,0,800,400);
    }

    // Title
    ctx.fillStyle = "black";
    ctx.font = "30px Arial";
    ctx.fillText("Calendar " + year, 280, 450);

    // Draw simple months (demo)
    let months = ["Jan","Feb","Mar","Apr","May","Jun"];

    ctx.font = "16px Arial";

    months.forEach((m,i)=>{
        ctx.fillText(m, 50 + i*120, 500);
    });
}

function download(){
    const link = document.createElement("a");
    link.download = "calendar.png";
    link.href = canvas.toDataURL();
    link.click();
}

// ================= TOUCH SUPPORT =================
let lastTouchX = 0;
let lastTouchY = 0;

canvas.addEventListener("touchstart", (e) => {
    dragging = true;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", () => {
    dragging = false;
});

canvas.addEventListener("touchmove", (e) => {

    if (!dragging) return;

    let touch = e.touches[0];

    let dx = touch.clientX - lastTouchX;
    let dy = touch.clientY - lastTouchY;

    posX += dx;
    posY += dy;

    lastTouchX = touch.clientX;
    lastTouchY = touch.clientY;

    generate();

});

</script>

<footer style="margin-top:20px; padding:15px; background:#111; color:#00ffcc; text-align:center; font-size:14px;">
    <strong>ISO YAWI</strong> | School of Electrical Engineering | PNG University of Technology<br>
    <span style="color:#ccc;">Building cool projects for students</span>
</footer>

</body>
</html>
